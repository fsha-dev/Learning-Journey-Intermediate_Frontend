<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Typing Accuracy Trainer</title>
  </head>
  <body>
    <h1 id="main_headline">Typing Accuracy Trainer</h1>
    <section id="typing_container">
      <div id="text_container">Texts will be appear here</div>
      <div class="flex_col">
        <div id="timer">00:00</div>
        <div id="words_typing_box">
          Start Typing and it will apear here soon
        </div>
      </div>
    </section>
    <section>
      <div id="accuracy_box">
        <h2>Accuracy</h2>
        <h3 id="accuracy_value">100%</h3>
      </div>
      <div id="mistackes_box">
        <h2>Mistakes</h2>
        <h3 id="mistakes_value">4</h3>
      </div>
      <div id="final_wpm">
        <h2>WPM</h2>
        <h3 id="wpm_value">42</h3>
      </div>
    </section>
    <button id="try_again_button">Try Again</button>
    <script src="script.js"></script>
  </body>
</html>
